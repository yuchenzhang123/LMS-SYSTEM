server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Vue Router history 模式回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------
    # 外部菜单/模型服务  smc-desktop.hi.bank-of-china.com:8099
    # /api/model/menulist/... → :8099/model/menulist/...
    # 必须放在 /api/ 之前（nginx 取最长前缀匹配）
    # -------------------------------------------------------
    location /api/model/ {
        proxy_pass http://smc-desktop.hi.bank-of-china.com:8099/model/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # 外部机构信息服务  smc-desktop.hi.bank-of-china.com:8099
    # /api/orginfo/orgid/{id} → :8099/api/orginfo/orgid/{id}
    # 必须放在 /api/ 之前（nginx 取最长前缀匹配）
    # -------------------------------------------------------
    location /api/orginfo/ {
        proxy_pass http://smc-desktop.hi.bank-of-china.com:8099/api/orginfo/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # Swagger UI & API Docs（不带 /api 前缀直接访问）
    # Swagger UI 内部会用绝对路径 /v2/api-docs 拉取文档
    # -------------------------------------------------------
    location /swagger-ui/ {
        proxy_pass http://127.0.0.1:8099/swagger-ui/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v2/api-docs {
        proxy_pass http://127.0.0.1:8099/v2/api-docs;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /webjars/ {
        proxy_pass http://127.0.0.1:8099/webjars/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # 本地业务后端  127.0.0.1:8099
    # /api/collection/... /api/notice/... /api/org/... 等
    # 剥离 /api 前缀后转发
    # -------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8099/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # OAuth2 令牌接口  smc-desktop.hi.bank-of-china.com:8098
    # /oauth/token → :8098/oauth/token（路径透传，不剥离前缀）
    # -------------------------------------------------------
    location /oauth/ {
        proxy_pass http://smc-desktop.hi.bank-of-china.com:8098/oauth/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # SSO 认证服务  smc-desktop.hi.bank-of-china.com:8098
    # /ssoservice/sso/tokenCheck → :8098/sso/tokenCheck
    # 剥离 /ssoservice 前缀后转发，透传 Set-Cookie
    # -------------------------------------------------------
    location /ssoservice/ {
        proxy_pass http://smc-desktop.hi.bank-of-china.com:8098/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
    }
}
