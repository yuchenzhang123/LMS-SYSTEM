# 开发环境配置
spring:
  datasource:
    # 主数据源 - MySQL（开发环境）
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/lms_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

    # GBase数据源（用于同步外部数据，开发环境可选）
    gbase:
      driver-class-name: ${GBASE_DRIVER:com.gbase.jdbc.Driver}
      url: ${GBASE_URL:jdbc:gbase://localhost:9088/lms_gbase}
      username: ${GBASE_USERNAME:root}
      password: ${GBASE_PASSWORD:root}
      hikari:
        maximum-pool-size: 5
        minimum-idle: 1
        connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

logging:
  level:
    com.bank.lms: info
    org.hibernate.SQL: warn
    org.hibernate.type: warn

lms:
  dev:
    generate-test-data: true
