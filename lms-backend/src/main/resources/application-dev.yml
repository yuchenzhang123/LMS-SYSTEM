# 开发环境配置
spring:
  datasource:
    # 主数据源 - MySQL（开发环境）
    main:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: 'jdbc:mysql://localhost:3306/lms_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true'
      username: root
      password: 'root'
      druid:
        initial-size: 2
        min-idle: 2
        max-active: 10
        max-wait: 30000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        validation-query: SELECT 1
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false

    # GBase数据源（用于同步外部数据，开发环境可选）
    gbase:
      driver-class-name: '${GBASE_DRIVER:com.gbase.jdbc.Driver}'
      url: '${GBASE_URL:jdbc:gbase://localhost:9088/lms_gbase}'
      username: '${GBASE_USERNAME:root}'
      password: '${GBASE_PASSWORD:root}'
      druid:
        initial-size: 1
        min-idle: 1
        max-active: 5
        max-wait: 30000
        validation-query: SELECT 1
        test-while-idle: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

logging:
  level:
    com.bank.lms: info
    org.hibernate.SQL: warn
    org.hibernate.type: warn

org:
  admin:
    codes: "${ORG_ADMIN_CODES:DEV_ADMIN}"  # 开发环境默认使用 DEV_ADMIN，可通过环境变量覆盖

lms:
  dev:
    generate-test-data: true
