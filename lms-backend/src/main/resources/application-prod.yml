# 生产环境配置
spring:
  datasource:
    # 主数据源 - GaussDB（LMS业务数据库）
    main:
      driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      druid:
        initial-size: 10
        min-idle: 10
        max-active: 30
        max-wait: 30000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        validation-query: SELECT 1
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        filters: stat,wall
        # 连接泄漏检测
        remove-abandoned: true
        remove-abandoned-timeout: 60000
        log-abandoned: true

    # GBase数据源（用于同步外部数据）
    gbase:
      driver-class-name: ${GBASE_DRIVER:com.gbase.jdbc.Driver}
      url: ${GBASE_URL}
      username: ${GBASE_USERNAME}
      password: ${GBASE_PASSWORD}
      druid:
        initial-size: 5
        min-idle: 5
        max-active: 20
        max-wait: 30000
        validation-query: SELECT 1
        test-while-idle: true
        # 连接泄漏检测
        remove-abandoned: true
        remove-abandoned-timeout: 60000
        log-abandoned: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 100
          batch_versioned_data: true

logging:
  level:
    com.bank.lms: info
    org.springframework: warn
    org.hibernate: warn

org:
  admin:
    codes: "${ORG_ADMIN_CODES:}"  # 生产环境必须通过环境变量 ORG_ADMIN_CODES 配置

auth:
  enabled: true
  token-check-url: "${OAUTH_TOKEN_CHECK_URL}"  # 例：https://sso.yourdomain.com/oauth/check_token

lms:
  dev:
    generate-test-data: false
