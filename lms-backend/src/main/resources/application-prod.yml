# 生产环境配置
spring:
  datasource:
    # 主数据源 - GaussDB（LMS业务数据库）
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

    # GBase数据源（用于同步外部数据）
    gbase:
      driver-class-name: ${GBASE_DRIVER:com.gbase.jdbc.Driver}
      url: ${GBASE_URL}
      username: ${GBASE_USERNAME}
      password: ${GBASE_PASSWORD}
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 100
          batch_versioned_data: true

logging:
  level:
    com.bank.lms: info
    org.springframework: warn
    org.hibernate: warn

lms:
  dev:
    generate-test-data: false
