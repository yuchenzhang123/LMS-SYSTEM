# 测试环境配置
spring:
  datasource:
    # 主数据源 - GaussDB（LMS业务数据库）
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lms_db}
    username: ${DB_USERNAME:lms_user}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

    # GBase数据源（用于同步外部数据）
    gbase:
      driver-class-name: ${GBASE_DRIVER:com.gbase.jdbc.Driver}
      url: ${GBASE_URL:jdbc:gbase://localhost:9088/lms_gbase}
      username: ${GBASE_USERNAME:root}
      password: ${GBASE_PASSWORD}
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
          batch_versioned_data: true

logging:
  level:
    com.bank.lms: info
    org.hibernate.SQL: warn

lms:
  dev:
    generate-test-data: false
