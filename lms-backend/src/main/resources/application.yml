server:
  port: 8099
  servlet:
    context-path: /
  tomcat:
    # 限制Tomcat接受的最大请求体大小，超过则直接拒绝，快速返回错误
    max-swallow-size: 11MB
    max-http-form-post-size: 11MB
  error:
    include-message: always  # 确保错误消息被包含在响应中
    include-binding-errors: always

spring:
  application:
    name: lms-backend
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    com.bank.lms: info
    org.springframework: info

org:
  admin:
    # 管理员机构号，多个用英文逗号分隔，各环境在对应 yml 中覆盖
    codes: ""

lms:
  log:
    archive:
      retention-years: 3  # 日志归档保留3年
  file:
    upload-path: file:./upload
    max-size: 10485760
    allowed-types:
      audio:
        - mp3
        - wav
        - aac
      image:
        - jpg
        - jpeg
        - png
        - gif
        - pdf
        - bmp
        - webp
      document:
        - pdf
        - doc
        - docx
        - txt
        - xlsx
        - xls
        - pptx
        - ppt
        - csv
        - rtf
        - zip
        - rar
        - 7z
      video:
        - mp4
        - avi
        - mov
        - wmv
        - flv
        - mkv
      archive:
        - zip
        - rar
        - 7z
        - tar
        - gz
  sms:
    enabled: false
