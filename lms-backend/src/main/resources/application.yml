server:
  port: 8099
  servlet:
    context-path: /

spring:
  application:
    name: lms-backend
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  profiles:
    active: dev

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    com.bank.lms: info
    org.springframework: info

lms:
  log:
    archive:
      retention-years: 3  # 日志归档保留3年
  file:
    upload-path: file:./upload
    max-size: 10485760
    allowed-types:
      audio:
        - mp3
        - wav
        - aac
      image:
        - jpg
        - jpeg
        - png
        - gif
        - pdf
        - bmp
        - webp
      document:
        - pdf
        - doc
        - docx
        - txt
        - xlsx
        - xls
        - pptx
        - ppt
        - csv
        - rtf
        - zip
        - rar
        - 7z
      video:
        - mp4
        - avi
        - mov
        - wmv
        - flv
        - mkv
      archive:
        - zip
        - rar
        - 7z
        - tar
        - gz
  sms:
    enabled: false
